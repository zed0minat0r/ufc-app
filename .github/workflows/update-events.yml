name: Update UFC Events

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch & verify UFC events (report only)
        run: python3 fetch-events.py

      - name: No auto-commit (verification only)
        run: echo "Event verification complete. Manual update required to patch main.js."
